# --------------------------------------
# Hexo Butterfly Theme Configuration
# https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  文章||fas fa-list:
    AI Infra: /categories/AI-Infra/ || fas fa-microchip
    Java: /categories/Java/ || fas fa-coffee
    LeetCode: /categories/LeetCode/ || fas fa-code
  项目: /projects/ || fas fa-rocket
  友链: /friends/ || fas fa-link
  关于: /about/ || fas fa-heart

# --------------------------------------
# Code Blocks Settings
# --------------------------------------

code_blocks:
  theme: mac
  macStyle: true
  height_limit: 450
  word_wrap: true
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:
  fab fa-github: https://github.com/SkychenLee || Github || '#181717'
  fas fa-envelope: mailto:your-email@example.com || Email || '#EA4335'

# --------------------------------------
# Image Settings
# --------------------------------------

favicon: /img/favicon.png

avatar:
  img: https://avatars.githubusercontent.com/u/SkychenLee
  effect: true

disable_top_img: false
default_top_img:
index_img:
archive_img:
tag_img:
tag_per_img:
category_img:
category_per_img:
footer_img: false

background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1280
    - https://images.unsplash.com/photo-1518770660439-4636190af475?w=1280
    - https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1280

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: '页面没有找到'
  background: https://images.unsplash.com/photo-1545972154-9bb223aac798?w=1280

post_meta:
  page:
    date_type: created
    date_format: relative
    categories: true
    tags: true
    label: true
  post:
    position: left
    date_type: both
    date_format: YYYY-MM-DD
    categories: true
    tags: true
    label: true

# --------------------------------------
# Index page settings
# --------------------------------------

index_site_info_top:
index_top_img_height:

subtitle:
  enable: true
  effect: true
  typed_option:
    typeSpeed: 70
    startDelay: 300
    backDelay: 2000
    loop: true
  source: false
  sub:
    - Building AI Infrastructure
    - Solving LeetCode Problems
    - Java & Distributed Systems

index_layout: 4

index_post_content:
  method: 3
  length: 300

# --------------------------------------
# Post Settings
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href: https://skychenlee.github.io
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false
  text:
  QR_code:

post_edit:
  enable: true
  url: https://github.com/SkychenLee/SkychenLee.github.io/edit/main/source/

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: 文章已经超过
  message_next: 天没有更新，内容可能已经过时。

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  nav:
    - content:
        - title: 链接
          item:
            - title: GitHub
              url: https://github.com/SkychenLee
            - title: RSS
              url: /atom.xml
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:
    - '<span><i class="fas fa-heartbeat"></i> Powered by Hexo & Butterfly</span>'

# --------------------------------------
# Aside Settings
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: <p>👋 Hi, I'm TerryLee</p><p>AI Infra / Java / Algorithms</p><p>分享技术，记录成长</p>
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/SkychenLee
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！这里分享 AI Infra、Java 和算法题解相关内容。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 10
    expand: true
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: true
    custom_colors:
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 12
    sort_order:
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date: 2025-01-01

# --------------------------------------
# Bottom right button
# --------------------------------------

rightside_bottom:

translate:
  enable: false
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: 1
  start:
  end:

rightside_scroll_percent: true

rightside_item_order:
  enable: false
  hide:
  show:

rightside_config_animation: true

# --------------------------------------
# Global Settings
# --------------------------------------

anchor:
  auto_update: false
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: true
    limit_count: 150

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Math
# --------------------------------------

math:
  use: katex
  per_page: false
  hide_scrollbar: false

  mathjax:
    enableMenu: true
    tags: none

  katex:
    copy_tex: true

# --------------------------------------
# Search
# --------------------------------------

search:
  use: local_search
  placeholder: 搜索文章...

  algolia_search:
    hitsPerPage: 6

  local_search:
    preload: true
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8
    CDN:

  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# Share System
# --------------------------------------

share:
  use: sharejs

  sharejs:
    sites: facebook,x,wechat,weibo,qq

  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# Comments System
# --------------------------------------

comments:
  use: Giscus
  text: true
  lazyload: false
  count: true
  card_post_count: false

# Giscus
# 注意：部署后需要到 https://giscus.app 获取以下配置
giscus:
  repo: SkychenLee/SkychenLee.github.io
  repo_id: 这里填入 giscus.app 生成的 repo_id
  category_id: 这里填入 giscus.app 生成的 category_id
  light_theme: light
  dark_theme: dark
  js:
  option:

# --------------------------------------
# Chat Services
# --------------------------------------

chat:
  use:
  rightside_button: false
  button_hide_show: false

chatra:
  id:

tidio:
  public_key:

crisp:
  website_id:

# --------------------------------------
# Analysis
# --------------------------------------

baidu_analytics:
google_analytics:
cloudflare_analytics:
microsoft_clarity:

umami_analytics:
  enable: false
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    token:

google_tag_manager:
  tag_id:
  domain:

# --------------------------------------
# Advertisement
# --------------------------------------

google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

ad:
  index:
  aside:
  post:

# --------------------------------------
# Verification
# --------------------------------------

site_verification:

# --------------------------------------
# Beautify / Effect
# --------------------------------------

theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

category_ui: index
tag_ui: index

rounded_corners_ui: true

text_align_justify: false

mask:
  header: true
  footer: true

preloader:
  enable: true
  source: 2
  pace_css_url:

enter_transitions: true

display_mode: light

beautify:
  enable: true
  field: post
  title_prefix_icon:
  title_prefix_icon_color:

font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  font_link:
  font_family:

hr_icon:
  enable: true
  icon:
  icon_top:

activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

canvas_fluttering_ribbon:
  enable: false
  mobile: false

canvas_nest:
  enable: false
  color: '0,0,255'
  opacity: 0.7
  zIndex: -1
